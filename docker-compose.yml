version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: xpresspp_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: xpresspp
    ports:
      - "5450:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
